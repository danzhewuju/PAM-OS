# Personal AI Memory OS configuration example.
# Copy this file to config/pam-os.toml and edit local values there.

[storage]
# SQLite database path. The default is user-global so multiple terminals and
# projects share the same local memory database.
# Environment override: PAM_OS_DB
db_path = "~/.pam-os/memory.sqlite3"

[server]
# REST API bind address and port used by the ASGI server.
# Environment overrides:
# - PAM_OS_HOST
# - PAM_OS_PORT
host = "127.0.0.1"
port = 8765

# Optional HTTP Basic Auth for REST API.
# Environment overrides:
# - PAM_OS_AUTH_ENABLED
# - PAM_OS_AUTH_USERNAME
# - PAM_OS_AUTH_PASSWORD
auth_enabled = false
auth_username = ""
auth_password = ""

[context]
# Default number of ordinary memories selected by prepare/compile flows.
default_limit = 12

# Maximum characters in the final prompt-ready context package.
# This is a simple MVP budget, not an exact tokenizer-based token count.
max_chars = 4000

# Number of profile traits considered before ordinary memories.
profile_limit = 8

[consolidation]
# Number of recent memories and behavior events scanned by one consolidation run.
recent_limit = 100

# Automatically promote accumulated stable memories into profile traits after capture.
auto_consolidate = true
auto_consolidate_min_memories = 5

# How much trait stability increases for each additional supporting evidence item.
stability_increment = 0.12

# Maximum confidence and stability values for profile traits.
max_confidence = 0.98
max_stability = 0.98

[orchestrator]
# Threshold for deciding whether a user request should read memory.
memory_use_threshold = 0.5

# Threshold for deciding whether content should be captured as memory.
capture_threshold = 0.5

# Extra candidate multiplier before reranking and budget trimming.
candidate_multiplier = 3

[retrieval]
# Maximum query terms extracted for SQLite FTS/LIKE search.
max_query_terms = 12

[extraction]
# Memory extractor provider. The default rule provider is local, deterministic,
# and dependency-free. The llm provider is optional and falls back to rules.
provider = "rule"

[providers.llm]
# Reserved for optional LLM-backed extraction providers.
enabled = false
model = ""
api_key_env = "OPENAI_API_KEY"
timeout_seconds = 8

[profile]
# Default number of profile traits returned by the profile endpoint.
default_limit = 20
