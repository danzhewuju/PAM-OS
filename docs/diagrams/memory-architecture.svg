  <path class="arrow write-arrow" d="M414 104 C468 104 462 248 518 248" />
  <path class="arrow write-arrow" d="M414 176 H518" />
  <path class="arrow write-arrow" d="M593 128 V152" />

  <path class="arrow upgrade-arrow" d="M414 248 H784" />
