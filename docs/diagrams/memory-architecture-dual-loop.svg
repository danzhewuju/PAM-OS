  <!-- Short feedback arrows only -->
  <path class="flow learn-line" d="M516 724 V690 H792 V618" />
  <path class="flow learn-flow" d="M792 618 H820" />
  <rect class="label-bg" x="614" y="675" width="76" height="18" rx="4" />
