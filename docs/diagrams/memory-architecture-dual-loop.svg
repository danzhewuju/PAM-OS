  <path class="flow write" d="M990 352 H1014" />
  <rect class="label-bg" x="974" y="438" width="35" height="18" rx="4" />
  <text class="line-label" x="980" y="451">store</text>
  <path class="flow write-line" d="M1099 560 V546" />
  <path class="flow write" d="M1099 546 V530" />
  <path class="flow write" d="M962 618 H1014" />
  <rect class="label-bg" x="970" y="603" width="37" height="18" rx="4" />
